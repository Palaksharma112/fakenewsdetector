<!DOCTYPE html>

<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>


<body>


<nav>

<h2>
📰 Fake News Detector
</h2>


<div>

<a href="/dashboard">
Home
</a>


<a href="/history">
History
</a>


<a href="/logout">
Logout
</a>


</div>


</nav>



<div class="container">


<h1>
News Checker
</h1>


<form method="POST">


<textarea 
name="news"
placeholder="Enter news headline here..."
required>
</textarea>


<button>
Check News
</button>


</form>



{% if result %}


<div class="result">

<h2>
Result:
{{ result }}
</h2>


</div>


{% endif %}


</div>


</body>

</html>
